name: CI-CD Docker Pipeline

on:
  push:
    branches:
      - main
      - trivy

env:
  IMAGE_NAME: webapp-ci-cd
  IMAGE_TAG: latest
  DOCKER_REGISTRY: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  # =================================
  # JOB 1 - BUILD AND PUSH
  # =================================
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t $DOCKER_REGISTRY/$IMAGE_NAME:$IMAGE_TAG .

      - name: Push Docker image
        run: docker push $DOCKER_REGISTRY/$IMAGE_NAME:$IMAGE_TAG

  # =================================
  # JOB 2 - TRIVY SCAN
  # =================================
  scan-trivy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@v0.31.0
        with:
          image-ref: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: 0 # Ne bloque pas le pipeline
          severity: CRITICAL,HIGH

  # =================================
  # JOB 3 - DEPLOY
  # =================================
  deploy:
    runs-on: ubuntu-latest
    needs: scan-trivy
    steps:
      - name: Pull Docker image
        run: docker pull $DOCKER_REGISTRY/$IMAGE_NAME:$IMAGE_TAG

      - name: Stop existing container
        run: docker stop ci-app || true

      - name: Remove old container
        run: docker rm ci-app || true

      - name: Run new container
        run: docker run -d -p 80:80 --name ci-app $DOCKER_REGISTRY/$IMAGE_NAME:$IMAGE_TAG
