name: CI-CD Docker Pipeline

on:
  push:
    branches:
      - main
      - trivy
  pull_request:
    branches:
      - main
      - trivy

# Forcer Node.js 24 pour toutes les actions JS
env:
  IMAGE_NAME: webapp-ci-cd
  IMAGE_TAG: 1.0.1
  DOCKER_REGISTRY: ${{ secrets.DOCKERHUB_USERNAME }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ===============================
  # JOB 1 - CI : BUILD + PUSH
  # ===============================
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5 # mis à jour pour Node.js 24

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: |
          docker build -t $DOCKER_REGISTRY/$IMAGE_NAME:$IMAGE_TAG .

      - name: Push Docker image
        run: |
          docker push $DOCKER_REGISTRY/$IMAGE_NAME:$IMAGE_TAG

  # ===============================
  # JOB 2 - SCAN TRIVY
  # ===============================
  scan-trivy:
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Checkout code
        uses: actions/checkout@v5 # mis à jour pour Node.js 24

      - name: Scan sécurité avec Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .

  # ===============================
  # JOB 3 - DEPLOY
  # ===============================
  deploy:
    runs-on: ubuntu-latest
    needs: scan-trivy

    steps:
      - name: Pull latest Docker image
        run: |
          docker pull $DOCKER_REGISTRY/$IMAGE_NAME:$IMAGE_TAG

      - name: Stop existing container
        run: |
          docker stop ci-app || true

      - name: Remove old container
        run: |
          docker rm ci-app || true

      - name: Run new container
        run: |
          docker run -d -p 80:80 --name ci-app $DOCKER_REGISTRY/$IMAGE_NAME:$IMAGE_TAG
